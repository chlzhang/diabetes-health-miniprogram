# ============================================
#  健康生活助手 - 后端编排
#  app (Node.js) + nginx (反代 + SSL)
#  兼容 Docker Compose V2 (docker compose)
# ============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sugar-guardian/app:latest
    container_name: sugar-app
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - app-data:/app/data
    networks:
      - sugar-net
    # 不直接暴露端口，全部走 nginx
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # 资源限制（按 ECS 配置调整）
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 128M

  nginx:
    image: nginx:1.25-alpine
    container_name: sugar-nginx
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP → HTTPS 重定向
      - "443:443"   # HTTPS 主入口
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - sugar-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app-data:
    name: sugar-app-data
  nginx-logs:
    name: sugar-nginx-logs

networks:
  sugar-net:
    name: sugar-net
    driver: bridge
